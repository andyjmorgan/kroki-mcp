# Example only — apply a real secret out-of-band, do NOT commit real values.
# Generate with:
#   ACCESS=$(openssl rand -hex 16)
#   SECRET=$(openssl rand -hex 32)
#   REDIS=$(openssl rand -hex 32)
#   kubectl -n kroki-mcp create secret generic kroki-mcp-secrets \
#     --from-literal=BlobStore__AccessKey=$ACCESS \
#     --from-literal=BlobStore__SecretKey=$SECRET \
#     --from-literal=Redis__ConnectionString="redis-master.kroki-mcp.svc.cluster.local:6379,password=$REDIS"
#
#   kubectl -n kroki-mcp create secret generic seaweedfs-s3-identity \
#     --from-file=identities.json=./seaweedfs-identities.json
#
#   kubectl -n kroki-mcp create secret generic redis-secret \
#     --from-literal=requirepass=$REDIS
apiVersion: v1
kind: Secret
metadata:
  name: kroki-mcp-secrets
  namespace: kroki-mcp
type: Opaque
stringData:
  BlobStore__AccessKey: "REPLACE_ME"
  BlobStore__SecretKey: "REPLACE_ME"
  Redis__ConnectionString: "redis-master.kroki-mcp.svc.cluster.local:6379,password=REPLACE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: kroki-mcp
type: Opaque
stringData:
  requirepass: "REPLACE_ME"
---
# SeaweedFS S3 identity. Anonymous gets Read on diagrams/* (no List).
# kroki-mcp-writer has full Read+Write on diagrams/*. Keys here must match
# kroki-mcp-secrets BlobStore__AccessKey / BlobStore__SecretKey above.
apiVersion: v1
kind: Secret
metadata:
  name: seaweedfs-s3-identity
  namespace: kroki-mcp
type: Opaque
stringData:
  identities.json: |
    {
      "identities": [
        {
          "name": "anonymous",
          "actions": ["Read:diagrams/*"]
        },
        {
          "name": "kroki-mcp-writer",
          "credentials": [
            {
              "accessKey": "REPLACE_ME",
              "secretKey": "REPLACE_ME"
            }
          ],
          "actions": ["Read:diagrams/*", "Write:diagrams/*"]
        }
      ]
    }
