# SeaweedFS combined master/volume/filer with the S3 gateway enabled.
# One pod, one PVC. TTL is enforced natively by the volume server on compaction
# (objects uploaded with Seaweed-Ttl: 30d are removed after 30 days).
#
# S3 identity (configured via seaweedfs-s3-identity secret):
#   - anonymous: Read on diagrams/*  (no List → directory listing returns 403)
#   - kroki-mcp-writer: Read+Write on diagrams/*
apiVersion: v1
kind: ConfigMap
metadata:
  name: seaweedfs-config
  namespace: kroki-mcp
data:
  filer.toml: |
    [leveldb2]
    enabled = true
    dir = "/data/filer"
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs
  namespace: kroki-mcp
  labels:
    app: seaweedfs
spec:
  type: ClusterIP
  ports:
    - name: s3
      port: 8333
      targetPort: s3
    - name: filer
      port: 8888
      targetPort: filer
    - name: master
      port: 9333
      targetPort: master
    - name: volume
      port: 8080
      targetPort: volume
  selector:
    app: seaweedfs
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: seaweedfs
  namespace: kroki-mcp
  labels:
    app: seaweedfs
spec:
  serviceName: seaweedfs
  replicas: 1
  selector:
    matchLabels:
      app: seaweedfs
  template:
    metadata:
      labels:
        app: seaweedfs
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: seaweedfs
          image: chrislusf/seaweedfs:3.80
          imagePullPolicy: IfNotPresent
          args:
            - "server"
            - "-dir=/data"
            - "-master.volumeSizeLimitMB=1024"
            - "-volume.max=10"
            - "-s3"
            - "-s3.config=/etc/seaweedfs/identities.json"
            - "-filer"
            - "-filer.config=/etc/seaweedfs/filer.toml"
            - "-metrics.port=9091"
          ports:
            - name: master
              containerPort: 9333
            - name: volume
              containerPort: 8080
            - name: filer
              containerPort: 8888
            - name: s3
              containerPort: 8333
            - name: metrics
              containerPort: 9091
          livenessProbe:
            httpGet:
              path: /status
              port: master
            initialDelaySeconds: 30
            periodSeconds: 20
          readinessProbe:
            tcpSocket:
              port: s3
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: s3-identity
              mountPath: /etc/seaweedfs/identities.json
              subPath: identities.json
              readOnly: true
            - name: filer-config
              mountPath: /etc/seaweedfs/filer.toml
              subPath: filer.toml
              readOnly: true
      volumes:
        - name: s3-identity
          secret:
            secretName: seaweedfs-s3-identity
        - name: filer-config
          configMap:
            name: seaweedfs-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
---
# Run once after first start to create the diagrams bucket.
# Idempotent — succeeds whether the bucket exists or not.
apiVersion: batch/v1
kind: Job
metadata:
  name: seaweedfs-bucket-init
  namespace: kroki-mcp
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: chrislusf/seaweedfs:3.80
          command:
            - sh
            - -c
            - |
              set -eu
              # Wait for filer
              until wget -q -O- http://seaweedfs.kroki-mcp.svc.cluster.local:8888/ >/dev/null 2>&1; do
                echo "waiting for filer..."; sleep 2
              done
              echo "s3.bucket.create -name diagrams" | weed shell \
                -filer=seaweedfs.kroki-mcp.svc.cluster.local:8888 \
                -master=seaweedfs.kroki-mcp.svc.cluster.local:9333 || true
              echo "done"
